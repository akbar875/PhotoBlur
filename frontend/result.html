<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hasil - Photoblur</title>
    <link rel="icon" type="image/jpeg" href="assets/logo/cat-camera.jpeg">
    <link rel="apple-touch-icon" href="assets/logo/cat-camera.jpeg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script type="module" src="js/result.js"></script>
  </head>
  <body>
    <main class="page-shell result-page">
      <nav class="navbar" aria-label="Navigasi utama">
        <a class="brand" href="index.html">
          <img src="assets/logo/cat-camera.jpeg" alt="Logo Photoblur">
          <span>Photoblur</span>
        </a>
        <span class="nav-note">Hasil akhir siap disimpan.</span>
      </nav>

      <section class="result-panel card">
        <p class="eyebrow">Hasil Akhir</p>
        <h1>Hasil Photoblur Kamu</h1>
        <img class="result-image" id="resultImage" alt="Hasil akhir Photoblur">
        <div class="result-actions">
          <button class="secondary-btn" id="editButton" type="button">Edit Lagi</button>
          <button class="secondary-btn" id="retakeButton" type="button">Foto Ulang</button>
          <button class="ghost-btn" id="homeButton" type="button">Kembali ke Awal</button>
          <button class="primary-btn" id="downloadButton" type="button">Download PNG</button>
        </div>
      </section>
    </main>
  </body>
</html>
